<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мой Сайт{% endblock %}</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .hero {
            background-color: #007bff;
            color: white;
            padding: 100px 0;
            text-align: center;
        }
        .form-section {
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="{% url 'index' %}">Агрегатор</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Переключить навигацию">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
					<a class="nav-link" href="{% url 'constructor' %}">Конструктор отчётов</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'deconstructor' %}">Обработка отчётов</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'processing_status' %}">Файлы в обработке</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'demonstrator' %}">Реестр актов</a>
                </li>
                <li class="nav-item">
				<a class="nav-link" href="{% url 'interactive_map' %}">Интерактивная карта</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-4">
        <div class="container">
            <p>&copy; 2024 ArchAgr</p>
        </div>
    </footer>
	
	<!-- Подключение JS и зависимости Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
