{% extends 'base.html' %}
{% load static %}

{% block title %}Статус обработки отчётов{% endblock %}

{% block content %}

	<br>
	<h2 align="center">Статус обработки отчётов</h2>
	<br>

    <div class="container upload-section">

			{% if tasks_id %}
				<script src="{% static 'celery_progress/celery_progress.js' %}"></script>
				<script>
					let i = 0;
					let progress_bars;
				</script>

				{% for task_id in tasks_id %}
					<div id="progress-result-{{ forloop.counter0 }}"></div>
					<div class='progress-wrapper-{{ forloop.counter0 }}'>
					  <div id='progress-bar-{{ forloop.counter0 }}' class='progress-bar' style="background-color: #68a9ef; width: 0%;">&nbsp;</div>
					</div>
					<div id="progress-bar-message-{{ forloop.counter0 }}">Ожидание загрузки файла...</div>
					<br>
				{% endfor %}
				<script>
					document.addEventListener("DOMContentLoaded", function () {
						const task_urls = [
							{% for task_id in tasks_id %}"{% url 'celery_progress:task_status' task_id %}",
						{% endfor %}];
						for (var i = 0; i < task_urls.length; i++) {
							CeleryProgressBar.initProgressBar(task_urls[i], {
								progressBarId: "progress-bar-" + i,
								progressBarMessageId: "progress-bar-message-" + i,
								resultElementId: "progress-result-" + i,
							});
						}
					});
				</script>
			{% endif %}
    </div>
{% endblock %}
