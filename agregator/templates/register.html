{% extends 'bases/base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
    <!-- Заголовок страницы -->
    <header class="hero" style="margin-top: 15px;">
        <div class="container">
            <h1 class="display-4">Регистрация</h1>
        </div>
    </header>

    <div class="container">
        <h2 class="mt-5">Создание новой учётной записи</h2>
        <form method="post" class="mt-4">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label for="password1">Пароль</label>
                <input type="password" class="form-control" id="password1" name="password1" required>
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label for="password2">Подтверждение пароля</label>
                <input type="password" class="form-control" id="password2" name="password2" required>
            </div>
            {% if error %}
                <p style="color:red;">{{ error }}</p>
            {% endif %}
            <button type="submit" class="btn btn-success" style="margin-top: 15px;">Зарегистрироваться</button>
        </form>
        <p class="mt-3">Уже есть аккаунт? <a href="{% url 'login' %}">Войдите</a></p>
    </div>
{% endblock %}
