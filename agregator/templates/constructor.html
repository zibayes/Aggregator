{% extends 'base.html' %}

{% block title %}Конструктор отчётов{% endblock %}

{% block content %}
	<!-- Заголовок страницы -->
    <header class="hero">
        <div class="container">
            <h1 class="display-4">Создание Отчёта</h1>
            <p class="lead">Заполните форму для создания разделов вашего отчёта.</p>
        </div>
    </header>

    <!-- Секция формы -->
    <div class="container form-section">
        <form action="/your-form-handler-url/" method="post">
            <div class="form-group">
                <label for="reportTitle">Название отчёта</label>
                <input type="text" class="form-control" id="reportTitle" name="report_title" required>
            </div>
            <div class="form-group">
                <label for="tableOfContents">Оглавление</label>
                <textarea class="form-control" id="tableOfContents" name="table_of_contents" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="participants">Список участников</label>
                <textarea class="form-control" id="participants" name="participants" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="chapter1">Глава 1</label>
                <textarea class="form-control" id="chapter1" name="chapter_1" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Создать Отчёт</button>
        </form>
    </div>
{% endblock %}
