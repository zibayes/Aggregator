{% extends 'base.html' %}
{% load static %}

{% block title %}Чат с нейросетью{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/gpt_chat.css' %}">
<script src="{% static 'js/marked.min.js' %}"></script>

<br>
<h2 align="center">Чат с нейросетью</h2>
<br>

<div id="chat-container">
    <div id="messages"></div>
    <div id="input-container">
        <input type="text" id="input" placeholder="Напишите ваше сообщение..."/>
        <button id="send-btn">Отправить</button>
    </div>
</div>

<script>
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('input').addEventListener('keypress', function (event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    });

    function sendMessage() {
        const inputField = document.getElementById('input');
        const messageText = inputField.value;

        if (messageText.trim() === '') return;

        // Добавляем сообщение пользователя в чат
        addMessage(messageText, 'user');

        // Очистка поля ввода
        inputField.value = '';

        // Отправляем AJAX-запрос
        const url = "/ask_gpt/"  // "http://localhost:1234/v1/chat/completions";
        const headers = {"Content-Type": "application/json", "X-CSRFToken": `{{ csrf_token }}`};
        const data = {
            "model": "llama-3.1-8b-lexi-uncensored-v2",
            "messages": [
                {"role": "system", "content": "You are a helpful assistant."},
                {"role": "user", "content": messageText}
            ],
            "temperature": 0.7,
            "max_tokens": -1,
            "stream": false
        };

        fetch(url, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(data)
        })
            .then(response => response.json())
            .then(result => {
                const aiMessage = result.choices[0].message.content;
                addMessage(aiMessage, 'ai');
            })
            .catch(error => {
                console.error('Error:', error);
            });
    }

    function addMessage(text, sender) {
        const formattedText = marked.marked(text); // text.replace(/\n/g, '<br>').replace(/\t/g, '&nbsp;&nbsp;&nbsp;&nbsp;');
        const messagesContainer = document.getElementById('messages');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        messageDiv.innerHTML = `${formattedText}`;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight; // Прокрутка вниз
    }
</script>

{% endblock %}
