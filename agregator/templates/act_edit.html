{% extends 'base.html' %}

{% block title %}Редактирование акта{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>Редактирование акта</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="year" class="form-label">Год</label>
            <input type="text" class="form-control" id="year" name="year" value="{{ act.year }}" required>
        </div>

        <div class="mb-3">
            <label for="finish_date" class="form-label">Дата окончания проведения ГИКЭ</label>
            <input type="text" class="form-control" id="finish_date" name="finish_date" value="{{ act.finish_date }}"
                   required>
        </div>

        <div class="mb-3">
            <label for="type" class="form-label">Вид ГИКЭ</label>
            <input type="text" class="form-control" id="type" name="type" value="{{ act.type }}" required>
        </div>

        <div class="mb-3">
            <label for="name_number" class="form-label">Номер (если имеется) и наименование Акта ГИКЭ</label>
            <input type="text" class="form-control" id="name_number" name="name_number" value="{{ act.name_number }}">
        </div>

        <div class="mb-3">
            <label for="place" class="form-label">Место проведения экспертизы</label>
            <input type="text" class="form-control" id="place" name="place" value="{{ act.place }}">
        </div>

        <div class="mb-3">
            <label for="customer" class="form-label">Заказчик работ</label>
            <input type="text" class="form-control" id="customer" name="customer" value="{{ act.customer }}">
        </div>

        <div class="mb-3">
            <label for="area" class="form-label">Площадь, протяжённость и/или др. параметры объекта</label>
            <input type="text" class="form-control" id="area" name="area" value="{{ act.area }}">
        </div>

        <div class="mb-3">
            <label for="expert" class="form-label">Эксперт</label>
            <input type="text" class="form-control" id="expert" name="expert" value="{{ act.expert }}">
        </div>

        <div class="mb-3">
            <label for="executioner" class="form-label">Исполнитель полевых работ</label>
            <input type="text" class="form-control" id="executioner" name="executioner" value="{{ act.executioner }}">
        </div>

        <div class="mb-3">
            <label for="open_list" class="form-label">ОЛ</label>
            <input type="text" class="form-control" id="open_list" name="open_list" value="{{ act.open_list }}">
        </div>

        <div class="mb-3">
            <label for="conclusion" class="form-label">Заключение. Выявленные объекты.</label>
            <textarea class="form-control" id="conclusion" name="conclusion">{{ act.conclusion }}</textarea>
        </div>

        <div class="mb-3">
            <label for="border_objects" class="form-label">Объекты расположенные в непосредственной близости. Для
                границ</label>
            <textarea class="form-control" id="border_objects" name="border_objects">{{ act.border_objects }}</textarea>
        </div>

        <!--
        <div class="mb-3">
            <label for="source" class="form-label">Исходный документ</label>
            <input type="file" class="form-control" id="source" name="source">
        </div>
        -->

        <div class="mb-3">
            <label for="act" class="form-label">Акт</label>
            <textarea class="form-control" id="act" name="act" rows="3">{{ act.act }}</textarea>
        </div>

        <div class="mb-3">
            <label for="start_date" class="form-label">Дата начала</label>
            <input type="text" class="form-control" id="start_date" name="start_date" value="{{ act.start_date }}">
        </div>

        <div class="mb-3">
            <label for="end_date" class="form-label">Дата завершения</label>
            <input type="text" class="form-control" id="end_date" name="end_date" value="{{ act.end_date }}">
        </div>

        <div class="mb-3">
            <label for="exp_place" class="form-label">Место экспертизы</label>
            <input type="text" class="form-control" id="exp_place" name="exp_place" value="{{ act.exp_place }}">
        </div>

        <div class="mb-3">
            <label for="exp_customer" class="form-label">Заказчик экспертизы</label>
            <input type="text" class="form-control" id="exp_customer" name="exp_customer"
                   value="{{ act.exp_customer }}">
        </div>

        <div class="mb-3">
            <label for="exp_expert" class="form-label">Эксперт</label>
            <input type="text" class="form-control" id="exp_expert" name="exp_expert" value="{{ act.exp_expert }}">
        </div>

        <div class="mb-3">
            <label for="relationship" class="form-label">Взаимоотношения</label>
            <textarea class="form-control" id="relationship" name="relationship"
                      rows="3">{{ act.relationship }}</textarea>
        </div>

        <div class="mb-3">
            <label for="goal" class="form-label">Цель</label>
            <textarea class="form-control" id="goal" name="goal" rows="3">{{ act.goal }}</textarea>
        </div>

        <div class="mb-3">
            <label for="object" class="form-label">Объект</label>
            <textarea class="form-control" id="object" name="object" rows="3">{{ act.object }}</textarea>
        </div>

        <div class="mb-3">
            <label for="docs" class="form-label">Документы</label>
            <textarea class="form-control" id="docs" name="docs" rows="3">{{ act.docs }}</textarea>
        </div>

        <div class="mb-3">
            <label for="exp_info" class="form-label">Информация об экспертизе</label>
            <textarea class="form-control" id="exp_info" name="exp_info" rows="3">{{ act.exp_info }}</textarea>
        </div>

        <div class="mb-3">
            <label for="exp_facts" class="form-label">Факты</label>
            <textarea class="form-control" id="exp_facts" name="exp_facts" rows="3">{{ act.exp_facts }}</textarea>
        </div>

        <div class="mb-3">
            <label for="literature" class="form-label">Литература</label>
            <textarea class="form-control" id="literature" name="literature" rows="3">{{ act.literature }}</textarea>
        </div>

        <div class="mb-3">
            <label for="exp_conclusion" class="form-label">Заключение экспертизы</label>
            <textarea class="form-control" id="exp_conclusion" name="exp_conclusion"
                      rows="3">{{ act.exp_conclusion }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">Сохранить</button>
    </form>

    <form method="POST" action="{% url 'acts_delete' act.id %}" class="mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"
                onclick="return confirm('Вы уверены, что хотите удалить этот акт?');">Удалить
        </button>
    </form>
</div>
{% endblock %}
