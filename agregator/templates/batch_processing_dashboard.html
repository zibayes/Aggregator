{% extends 'bases/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Пакетная обработка файлов</h2>

    <div class="card">
        <div class="card-body">
            <form id="scanForm">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Тип файлов:</label>
                            <select name="file_type" class="form-select" id="fileType">
                                <option value="act">Акты ГИКЭ</option>
                                <option value="scientific_report">Научные отчеты</option>
                                <option value="tech_report">Технические отчеты</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Директория:</label>
                            <div class="input-group">
                                <input type="text" name="directory" class="form-control"
                                       id="directoryPath" placeholder="Путь к директории">
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="browseDirectory()">Обзор
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label class="form-label">Лимит файлов:</label>
                            <select name="limit" class="form-select" id="fileLimit">
                                <option value="1000">1000</option>
                                <option value="5000">5000</option>
                                <option value="10000">10000</option>
                                <option value="50000">50000</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Сканировать директорию</button>
            </form>
        </div>
    </div>

    <div id="scanProgress" class="mt-3" style="display: none;">
        <div class="alert alert-info">
            <div class="d-flex justify-content-between align-items-center">
                <span>Сканирование директории...</span>
                <div class="spinner-border spinner-border-sm" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <div id="fileList" class="mt-4" style="display: none;">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Найденные файлы (только новые)</h5>
                <div>
                    <span id="fileCount" class="badge bg-primary me-2"></span>
                    <span id="paginationInfo" class="badge bg-secondary"></span>
                </div>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <button class="btn btn-sm btn-outline-secondary" onclick="selectAll()">Выбрать все на странице
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="deselectAll()">Снять выделение</button>
                    <button class="btn btn-sm btn-outline-success" onclick="selectAllFiles()">Выбрать ВСЕ новые файлы
                    </button>
                </div>

                <div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
                    <table class="table table-sm table-hover">
                        <thead>
                        <tr>
                            <th width="50px"><input type="checkbox" id="selectAllCheckbox"
                                                    onchange="toggleSelectAll(this.checked)"></th>
                            <th>Файл</th>
                            <th width="100px">Размер</th>
                            <th width="120px">Статус</th>
                            <th width="200px">Хеш</th>
                        </tr>
                        </thead>
                        <tbody id="fileTableBody"></tbody>
                    </table>
                </div>

                <!-- Пагинация -->
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <div>
                        <button class="btn btn-sm btn-outline-primary" id="prevPage" onclick="changePage(-1)">Назад
                        </button>
                        <span class="mx-2" id="pageInfo">Страница 1 из 1</span>
                        <button class="btn btn-sm btn-outline-primary" id="nextPage" onclick="changePage(1)">Вперед
                        </button>
                    </div>
                    <div>
                        <span class="text-muted" id="pageStats"></span>
                    </div>
                </div>

                <div class="accordion mt-3" id="accordionColumns">
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                    data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
                                Выбор разделов документа для обработки
                            </button>
                        </h2>
                        <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionColumns">
                            <div class="accordion-body">
                                <label><input type="checkbox" name="select_text" checked> Текст</label><br>
                                <label><input type="checkbox" name="select_image" checked> Изображения</label><br>
                                <label><input type="checkbox" name="select_coord" checked> Координаты</label><br>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-3">
                    <button id="processBtn" class="btn btn-success" onclick="processSelected()">
                        Обработать выбранные файлы (<span id="selectedCount">0</span>)
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Функция для отладки
function debugLog(message) {
    console.log(message);
}

// Глобальные переменные для управления состоянием
let currentFilesData = [];
let currentPage = 1;
let totalPages = 1;
let allNewFiles = []; // Все новые файлы (все страницы)
let selectedAllFiles = false;

// Загрузка DOM
document.addEventListener('DOMContentLoaded', function() {
    debugLog('DOM загружен');
    const scanForm = document.getElementById('scanForm');
    if (scanForm) {
        scanForm.addEventListener('submit', handleScanSubmit);
    } else {
        debugLog('ОШИБКА: Форма scanForm не найдена!');
    }

    // Инициализируем элементы после загрузки DOM
    initializeElements();
});

// Инициализация элементов DOM
function initializeElements() {
    // Создаем необходимые элементы если их нет
    if (!document.getElementById('fileCount')) {
        const fileCountElement = document.createElement('span');
        fileCountElement.id = 'fileCount';
        fileCountElement.className = 'badge bg-primary me-2';

        const cardHeader = document.querySelector('.card-header');
        if (cardHeader) {
            const existingBadge = cardHeader.querySelector('.badge');
            if (existingBadge) {
                existingBadge.after(fileCountElement);
            } else {
                cardHeader.appendChild(fileCountElement);
            }
        }
    }
}

// Обработчик сканирования директории
async function handleScanSubmit(e) {
    e.preventDefault();

    const directory = document.getElementById('directoryPath').value;
    const fileType = document.getElementById('fileType').value;
    const limit = document.getElementById('fileLimit').value;

    if (!directory) {
        alert('Укажите директорию для сканирования');
        return;
    }

    // Показываем индикатор прогресса
    const scanProgress = document.getElementById('scanProgress');
    if (scanProgress) scanProgress.style.display = 'block';

    const fileList = document.getElementById('fileList');
    if (fileList) fileList.style.display = 'none';

    try {
        const response = await fetch('/batch/scan/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: new URLSearchParams({
                'directory': directory,
                'file_type': fileType,
                'page': '1',
                'limit': limit
            })
        });

        if (!response.ok) {
            throw new Error('HTTP error: ' + response.status);
        }

        const data = await response.json();

        if (data.error) {
            alert('Ошибка: ' + data.error);
            return;
        }

        // Сохраняем все новые файлы
        allNewFiles = data.files || [];
        currentPage = data.current_page || 1;
        totalPages = data.total_pages || 1;

        displayFiles(data);
        updatePagination(data);

    } catch (error) {
        debugLog('Ошибка при сканировании: ' + error.message);
        alert('Ошибка при сканировании директории: ' + error.message);
    } finally {
        if (scanProgress) scanProgress.style.display = 'none';
    }
}

// Отображение файлов
function displayFiles(data) {
    const fileList = document.getElementById('fileList');
    const fileCount = document.getElementById('fileCount');
    const fileTableBody = document.getElementById('fileTableBody');

    if (!fileList || !fileTableBody) {
        debugLog('ОШИБКА: Не найдены необходимые элементы DOM');
        return;
    }

    fileList.style.display = 'block';

    // Обновляем статистику если элемент существует
    if (fileCount) {
        fileCount.textContent = `Всего: ${data.total_count}, Новых: ${data.new_files}, Существующих: ${data.existing_files}`;
    }

    let tableHtml = '';

    if (data.files && data.files.length > 0) {
        data.files.forEach((file, index) => {
            const isSelected = selectedAllFiles || isFileSelected(file.path);
            tableHtml += `
                <tr>
                    <td>
                        <input type="checkbox" class="file-checkbox" value="${file.path}"
                               ${isSelected ? 'checked' : ''}
                               onchange="updateSelection()">
                    </td>
                    <td>
                        <div class="fw-bold">${file.name}</div>
                        <small class="text-muted">${file.relative_path}</small>
                    </td>
                    <td>${(file.size / 1024 / 1024).toFixed(2)} МБ</td>
                    <td><span class="badge bg-success">Новый</span></td>
                    <td title="${file.file_hash}">
                        <small>${file.file_hash ? file.file_hash.substring(0, 16) + '...' : 'Не вычислен'}</small>
                    </td>
                </tr>
            `;
        });
    } else {
        tableHtml = '<tr><td colspan="5" class="text-center">Новых файлов не найдено</td></tr>';
    }

    fileTableBody.innerHTML = tableHtml;
    updateSelection();
}

// Пагинация
async function changePage(direction) {
    const newPage = currentPage + direction;
    if (newPage < 1 || newPage > totalPages) return;

    currentPage = newPage;

    const directory = document.getElementById('directoryPath').value;
    const fileType = document.getElementById('fileType').value;
    const limit = document.getElementById('fileLimit').value;

    try {
        const response = await fetch('/batch/scan/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: new URLSearchParams({
                'directory': directory,
                'file_type': fileType,
                'page': currentPage.toString(),
                'limit': limit
            })
        });

        const data = await response.json();
        if (data.error) {
            alert('Ошибка: ' + data.error);
            return;
        }

        // Обновляем все новые файлы
        allNewFiles = data.files || [];
        displayFiles(data);
        updatePagination(data);

    } catch (error) {
        debugLog('Ошибка при загрузке страницы: ' + error.message);
        alert('Ошибка при загрузке страницы: ' + error.message);
    }
}

function updatePagination(data) {
    const pageInfo = document.getElementById('pageInfo');
    const pageStats = document.getElementById('pageStats');
    const prevPage = document.getElementById('prevPage');
    const nextPage = document.getElementById('nextPage');

    if (pageInfo) pageInfo.textContent = `Страница ${data.current_page} из ${data.total_pages}`;
    if (pageStats) pageStats.textContent = `Показано: ${data.files.length} файлов`;

    if (prevPage) prevPage.disabled = !data.has_previous;
    if (nextPage) nextPage.disabled = !data.has_next;
}

// Управление выбором файлов
function toggleSelectAll(checked) {
    const checkboxes = document.querySelectorAll('.file-checkbox');
    checkboxes.forEach(checkbox => {
        checkbox.checked = checked;
    });
    updateSelection();
}

function selectAll() {
    document.querySelectorAll('.file-checkbox').forEach(checkbox => {
        checkbox.checked = true;
    });
    updateSelection();
}

function deselectAll() {
    selectedAllFiles = false;
    document.querySelectorAll('.file-checkbox').forEach(checkbox => {
        checkbox.checked = false;
    });
    updateSelection();
}

function selectAllFiles() {
    selectedAllFiles = true;
    document.querySelectorAll('.file-checkbox').forEach(checkbox => {
        checkbox.checked = true;
    });
    updateSelection();
    alert(`Выбраны ВСЕ новые файлы (${allNewFiles.length} шт.)`);
}

function isFileSelected(filePath) {
    // В упрощенной версии всегда возвращаем false для индивидуального выбора
    // В сложной реализации можно хранить Set с выбранными файлами
    return false;
}

function updateSelection() {
    const selectedCountElement = document.getElementById('selectedCount');
    if (!selectedCountElement) return;

    const selectedCount = document.querySelectorAll('.file-checkbox:checked').length;
    selectedCountElement.textContent = selectedAllFiles ? 'ВСЕ' : selectedCount;
}

// Обработка выбранных файлов
async function processSelected() {
    let selectedFiles = [];

    if (selectedAllFiles) {
        // Берем все файлы из всех страниц
        selectedFiles = allNewFiles.map(file => file.path);
    } else {
        // Берем только отмеченные чекбоксы
        selectedFiles = Array.from(document.querySelectorAll('.file-checkbox:checked'))
            .map(checkbox => checkbox.value);
    }

    if (selectedFiles.length === 0) {
        alert('Выберите файлы для обработки');
        return;
    }

    const selectText = document.querySelector('input[name="select_text"]').checked;
    const selectImage = document.querySelector('input[name="select_image"]').checked;
    const selectCoord = document.querySelector('input[name="select_coord"]').checked;

    const processBtn = document.getElementById('processBtn');
    if (!processBtn) {
        alert('Элемент кнопки не найден');
        return;
    }

    const originalText = processBtn.innerHTML;
    processBtn.disabled = true;
    processBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Обработка...';

    try {
        const response = await fetch('/batch/process/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({
                file_paths: selectedFiles,
                file_type: document.getElementById('fileType').value,
                select_text: selectText,
                select_image: selectImage,
                select_coord: selectCoord,
                is_public: true
            })
        });

        const result = await response.json();

        if (result.success) {
            alert(`Успешно запущена обработка ${result.processed_count} файлов`);
            // Сбрасываем состояние
            selectedAllFiles = false;
            // Перезапускаем сканирование чтобы обновить список
            document.getElementById('scanForm').dispatchEvent(new Event('submit'));
        } else {
            alert('Ошибка: ' + result.error);
        }
    } catch (error) {
        alert('Ошибка при отправке запроса: ' + error);
    } finally {
        processBtn.disabled = false;
        processBtn.innerHTML = `Обработать выбранные файлы (<span id="selectedCount">0</span>)`;
        // Переинициализируем элемент selectedCount
        updateSelection();
    }
}

// Вспомогательные функции
function browseDirectory() {
    const fileType = document.getElementById('fileType').value;
    const defaultDirs = {
        'act': 'uploaded_files/Акты ГИКЭ',
        'scientific_report': 'uploaded_files/Научные отчёты',
        'tech_report': 'uploaded_files/Научно-технические отчёты'
    };
    document.getElementById('directoryPath').value = defaultDirs[fileType] || '';
}
</script>

{% endblock %}
