events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upstream для TileServer GL
    upstream tileserver {
        server tileserver-gl:8080;
    }

    # Upstream для Django приложения
    upstream django_app {
        server app:8000;
    }

    # Базовые настройки
    sendfile on;
    keepalive_timeout 65;

    # Логирование
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name _;

        # Статические растровые тайлы - ИСПРАВЛЕНО!
        location ~ ^/raster/(?<map_name>[^/]+)/(?<z>\d+)/(?<x>\d+)/(?<y>\d+)\.png$ {
	        root /var/www;
		    try_files /$map_name/$z/$x/$y.png =404;
			autoindex off;
            
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;
            access_log on;
            
            # Оптимизация для изображений
            gzip on;
            gzip_types image/png image/jpeg image/webp;
        }
		
		location /raster/ {
			return 403;
		}

        # Векторные тайлы через TileServer GL
        location /vector/ {
            proxy_pass http://tileserver/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin "*" always;
            
            # Кэширование векторных тайлов
            proxy_cache tiles_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 302 1h;
            proxy_cache_valid 404 1m;
        }

        # Основное Django приложение
        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Кэш для тайлов
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=tiles_cache:10m max_size=1g 
                     inactive=60m use_temp_path=off;
}