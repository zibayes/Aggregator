services:
  app:
    build: .
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
    volumes:
      - .:/app
      - ./supervisord_logs:/var/log
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    environment:
      DEBUG: "1"
      DB_HOST: db
      REDIS_HOST: redis
      CELERY_BROKER_URL: "redis://redis:6379/0"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:17
    user: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      TZ: Asia/Krasnoyarsk
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./wal_archive:/var/lib/postgresql/wal_archive
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-config.sh

  backup:
    image: postgres:17-alpine
    depends_on:
      - db
    volumes:
      - ./backups:/backups
      - ./backup_scripts:/scripts
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c "
      apk add --no-cache postgresql-client &&
      chmod +x /scripts/backup.sh &&
      echo '0 3 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root &&
      crond -l 2 -f
      "
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
      
  kodexplorer:
    image: debian:bookworm
    ports:
      - "8080:8080"
    volumes:
      - ./uploaded_files:/opt/kodexplorer/data/files  # ваша папка с файлами
      - ./kodexplorer_config:/etc/nginx/sites-available
    working_dir: /opt
    command: >
      sh -c "
      apt update && apt install -y nginx php-fpm php-common php-mbstring php-xml php-zip wget unzip &&
      wget https://github.com/kalcaddle/KodExplorer/archive/refs/tags/4.49.zip &&
      unzip 4.49.zip && mv KodExplorer-4.49 kodexplorer && rm 4.49.zip &&
      chown -R www-data:www-data kodexplorer &&
      echo 'server {
        listen 8080;
        server_name localhost;
        root /opt/kodexplorer;
        index index.php index.html;

        location / {
          try_files \$uri \$uri/ /index.php?\$args;
        }

        location ~ \.php\$ {
          include snippets/fastcgi-php.conf;
          fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
          fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name;
          include fastcgi_params;
        }
      }' > /etc/nginx/sites-available/kodexplorer &&
      ln -s /etc/nginx/sites-available/kodexplorer /etc/nginx/sites-enabled/ &&
      service php8.4-fpm start && nginx -g 'daemon off;'
      "
    restart: unless-stopped

volumes:
  postgres_data: