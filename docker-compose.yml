services:
  app:
    build: .
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
    volumes:
      - .:/app
      - ./supervisord_logs:/var/log
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    environment:
      DEBUG: "1"
      DB_HOST: db
      REDIS_HOST: redis
      CELERY_BROKER_URL: "redis://redis:6379/0"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:17
    user: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      TZ: Asia/Krasnoyarsk
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./wal_archive:/var/lib/postgresql/wal_archive
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-config.sh

  backup:
    image: postgres:17-alpine
    depends_on:
      - db
    volumes:
      - ./backups:/backups
      - ./backup_scripts:/scripts
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c "
      apk add --no-cache postgresql-client &&
      chmod +x /scripts/backup.sh &&
      echo '0 3 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root &&
      crond -l 2 -f
      "
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
      
  kodexplorer:
    image: kodcloud/kodexplorer:latest
    container_name: kodexplorer
    restart: unless-stopped
    ports:
      - "8080:80"  # Доступ к KodExplorer по http://localhost:8080
    volumes:
      - ./uploaded_files:/var/www/html/data  # Хранение данных пользователя
      - ./kodexplorer_config:/var/www/html/config  # Конфигурация (если нужна)
    environment:
      - TZ=Asia/Krasnoyarsk  # Установите ваш часовой пояс
      
volumes:
  postgres_data: