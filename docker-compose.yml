services:
  app:
    build: .
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
    volumes:
      - C:\Users\Admin.DESKTOP-TA0PCP4\Desktop\Django-server\archeology:/app
      - C:\Users\Admin.DESKTOP-TA0PCP4\Desktop\Django-server\archeology\supervisord_logs:/var/log
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    environment:
      DEBUG: "1"
      DB_HOST: db
      REDIS_HOST: redis
      CELERY_BROKER_URL: "redis://redis:6379/0"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:17
    user: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      TZ: Asia/Krasnoyarsk
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./wal_archive:/var/lib/postgresql/wal_archive
    command: >
      bash -c "
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        initdb -D /var/lib/postgresql/data && 
        echo \"wal_level=replica
        archive_mode=on
        archive_command='test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'\" >> /var/lib/postgresql/data/postgresql.conf
      fi;
      exec postgres -D /var/lib/postgresql/data
      "

  backup:
    image: alpine:3.18
    depends_on:
      - db
    volumes:
      - ./backups:/backups
      - ./backup_scripts:/scripts
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c "
      chmod +x /scripts/backup.sh &&
      echo '0 3 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root &&
      crond -l 2 -f
      "
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres

volumes:
  postgres_data: