services:
  app:
    build: .
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
    volumes:
      - C:\Users\Admin.DESKTOP-TA0PCP4\Desktop\Django-server\archeology:/app
      - C:\Users\Admin.DESKTOP-TA0PCP4\Desktop\Django-server\archeology\supervisord_logs:/var/log
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    environment:
      DEBUG: "1"
      DB_HOST: db
      REDIS_HOST: redis
      CELERY_BROKER_URL: "redis://redis:6379/0"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:17
    user: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      TZ: Asia/Krasnoyarsk
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./wal_archive:/var/lib/postgresql/wal_archive
      - ./postgresql.conf:/var/lib/postgresql/data/postgresql.conf
    command: >
      bash -c "
      # Проверяем, пуста ли директория или не инициализирована БД
        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          # Очищаем директорию если она не пустая
          find /var/lib/postgresql/data -mindepth 1 -delete
          chmod 750 /var/lib/postgresql/data || true
          chown postgres:postgres /var/lib/postgresql/data || true
          # Инициализируем БД
          initdb -D /var/lib/postgresql/data
          # Настраиваем конфигурацию
          echo \"wal_level=replica
          archive_mode=on
          archive_command='test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'\" >> /var/lib/postgresql/data/postgresql.conf
        fi;
        # Запускаем PostgreSQL
        exec postgres -D /var/lib/postgresql/data
      "

  backup:
    image: postgres:17-alpine
    depends_on:
      - db
    volumes:
      - ./backups:/backups
      - ./backup_scripts:/scripts
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c "
      apk add --no-cache postgresql-client &&
      chmod +x /scripts/backup.sh &&
      echo '0 3 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root &&
      crond -l 2 -f
      "
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres

volumes:
  postgres_data: